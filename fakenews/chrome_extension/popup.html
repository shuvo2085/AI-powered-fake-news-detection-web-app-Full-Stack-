<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 480px;
      background: #080c12;
      color: #e8f0fe;
      font-family: 'Segoe UI', sans-serif;
    }
    .header {
      background: linear-gradient(135deg, #0d1420, #111927);
      border-bottom: 1px solid #1e2d42;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; font-weight: 800; color: #00e5ff; letter-spacing: -0.5px; }
    .logo span { color: #e8f0fe; }
    .subtitle { font-size: 10px; color: #5a7090; letter-spacing: 1px; text-transform: uppercase; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #5a7090; margin-left: auto; }
    .status-dot.online { background: #00e096; }

    .body { padding: 16px; }

    .section-label {
      font-size: 10px;
      color: #00e5ff;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #0d1420;
      border: 1px solid #1e2d42;
      border-radius: 8px;
      padding: 10px;
      color: #e8f0fe;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      outline: none;
      margin-bottom: 10px;
    }
    textarea:focus { border-color: #00e5ff; }
    textarea::placeholder { color: #5a7090; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 14px; }

    .btn-grab {
      flex: 1;
      padding: 9px 12px;
      background: #0d1420;
      border: 1px solid #1e2d42;
      border-radius: 8px;
      color: #00e5ff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-grab:hover { border-color: #00e5ff; background: #111927; }

    .btn-analyze {
      flex: 1;
      padding: 9px 12px;
      background: linear-gradient(135deg, #00e5ff, #7b61ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-analyze:hover { opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    .result {
      background: #0d1420;
      border: 1px solid #1e2d42;
      border-radius: 10px;
      padding: 14px;
      display: none;
    }
    .result.visible { display: block; }
    .result.fake { border-color: #ff3c5f; }
    .result.real { border-color: #00e096; }
    .result.uncertain { border-color: #ffb800; }

    .verdict {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .verdict.fake { color: #ff3c5f; }
    .verdict.real { color: #00e096; }
    .verdict.uncertain { color: #ffb800; }

    .conf-bar { height: 4px; background: #1e2d42; border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; }
    .fake .conf-fill { background: #ff3c5f; }
    .real .conf-fill { background: #00e096; }
    .uncertain .conf-fill { background: #ffb800; }

    .conf-label { font-size: 11px; color: #5a7090; margin-bottom: 8px; }

    .flag { font-size: 11px; color: #c0cfe0; padding: 5px 8px; background: rgba(255,60,95,0.1); border-left: 2px solid #ff3c5f; border-radius: 0 4px 4px 0; margin-bottom: 4px; }
    .strength { font-size: 11px; color: #c0cfe0; padding: 5px 8px; background: rgba(0,224,150,0.08); border-left: 2px solid #00e096; border-radius: 0 4px 4px 0; margin-bottom: 4px; }

    .open-app-btn {
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: transparent;
      border: 1px solid #1e2d42;
      border-radius: 8px;
      color: #5a7090;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .open-app-btn:hover { border-color: #00e5ff; color: #00e5ff; }

    .loading { text-align: center; padding: 20px; color: #5a7090; font-size: 12px; }
    .error { color: #ff3c5f; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">Truth<span>Lens</span></div>
    <div class="subtitle">Fake News Detector</div>
  </div>
  <div class="status-dot" id="dot"></div>
</div>

<div class="body">
  <div class="section-label">Article Text</div>
  <textarea id="articleText" placeholder="Paste article text or click 'Grab Page' to extract from current tab..."></textarea>

  <div class="btn-row">
    <button class="btn-grab" onclick="grabPage()">📄 Grab Page</button>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">🔍 Analyze</button>
  </div>

  <div id="errorEl" class="error" style="display:none;margin-bottom:8px;"></div>

  <div class="result" id="resultEl">
    <div class="verdict" id="verdictEl">FAKE</div>
    <div class="conf-label" id="confLabel">Confidence: 0%</div>
    <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
    <div id="flagsEl"></div>
    <div id="strEl" style="margin-top:6px;"></div>
  </div>

  <button class="open-app-btn" onclick="openApp()">🚀 Open Full App</button>
</div>

<script src="popup.js"></script>
</body>
</html>
